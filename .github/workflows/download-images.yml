name: Download and commit images
on:
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Download images
        run: |
          mkdir -p images
          curl -L --max-time 30 -o images/sarit-kraus.jpg "https://upload.wikimedia.org/wikipedia/commons/a/af/Prof_Sarit_kraus.jpg"
          curl -L --max-time 30 -o images/sharon-gannot.jpg "https://sharongannot.group/wp-content/themes/sound/img/pic-sharon-gannot.jpg"
          curl -L --max-time 30 -o images/gal-kaminka.jpg "https://u.cs.biu.ac.il/~kaminkg/authors/galk/avatar_hu0524f3c4459aaec3b3a6f1993099c166_79443_270x270_fill_q75_lanczos_center.jpg"
          ls -la images/
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || git commit -m "Add local copies of images"
          git push
