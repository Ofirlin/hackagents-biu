name: Download and commit images
on:
  workflow_dispatch:
jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download images
        run: |
          mkdir -p images
          curl -o images/cs-biu-logo.png "https://cs.biu.ac.il/sites/cs/themes/dolev21_sub/images/d/BIULogoEng@3x.png"
          curl -o images/engineering-biu-logo.png "https://engineering.biu.ac.il/sites/engineering/themes/dolev21_sub/images/d/BIULogoEng@3x.png"
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "Add local copies of BIU logos" || echo "No changes to commit"
          git push
