<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181 34" width="181" height="34">
  <style>
    .logo-text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  <!-- Red bar accent above the 'a' -->
  <rect x="29" y="2" width="21" height="5" fill="#CC0000"/>
  <!-- Cadence wordmark -->
  <text x="0" y="30" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" fill="#222222" letter-spacing="-0.5">cadence</text>
  <!-- Registered trademark symbol -->
  <text x="163" y="12" font-family="Arial" font-size="10" fill="#222222">®</text>
</svg>
